<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Clientes</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Cadastro de Clientes</h1>
  </header>

  <main>

    <!-- Seção: Lista de clientes -->
    <section id="secao-lista">
      <div class="cabecalho-secao">
        <h2>Clientes</h2>
        <button onclick="mostrarFormulario()">+ Novo Cliente</button>
      </div>
      <table>
        <thead>
          <tr>
            <th>Nome</th>
            <th>CPF</th>
            <th>Email</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="corpo-tabela"></tbody>
      </table>
    </section>

    <!-- Seção: Formulário de cliente (novo / editar) -->
    <section id="secao-formulario" class="oculto">
      <h2 id="titulo-formulario">Novo Cliente</h2>
      <form id="form-cliente" onsubmit="salvarCliente(event)">
        <input type="hidden" id="cliente-id">
        <div class="campo">
          <label for="nome">Nome *</label>
          <input type="text" id="nome" required>
        </div>
        <div class="campo">
          <label for="cpf">CPF *</label>
          <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" required onblur="validarCampoCPF()">
          <span class="erro-campo oculto" id="erro-cpf">CPF inválido</span>
        </div>
        <div class="campo">
          <label for="email">Email</label>
          <input type="email" id="email">
        </div>
        <div class="campo">
          <label for="data-nascimento">Data de Nascimento</label>
          <input type="date" id="data-nascimento">
        </div>
        <div class="campo">
          <label for="endereco">Endereço</label>
          <textarea id="endereco" rows="3"></textarea>
        </div>
        <div class="acoes-form">
          <button type="submit">Salvar</button>
          <button type="button" class="btn-secundario" onclick="mostrarLista()">Cancelar</button>
        </div>
      </form>
    </section>

    <!-- Seção: Detalhe do cliente e seus contatos -->
    <section id="secao-detalhe" class="oculto">
      <button class="btn-voltar" onclick="mostrarLista()">← Voltar para lista</button>

      <div id="info-cliente"></div>

      <div class="cabecalho-secao">
        <h3>Contatos</h3>
      </div>
      <table>
        <thead>
          <tr>
            <th>Telefone</th>
            <th>Tipo</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="corpo-contatos"></tbody>
      </table>

      <h3 style="margin-top:1.5rem" id="titulo-form-contato">Adicionar Contato</h3>
      <form id="form-contato" onsubmit="salvarContato(event)">
        <input type="hidden" id="contato-id">
        <div class="campos-inline">
          <div class="campo">
            <label for="telefone">Telefone *</label>
            <input type="text" id="telefone" placeholder="(00) 00000-0000" required>
          </div>
          <div class="campo">
            <label for="tipo-contato">Tipo *</label>
            <select id="tipo-contato" required>
              <option value="celular">Celular</option>
              <option value="trabalho">Trabalho</option>
              <option value="residencial">Residencial</option>
            </select>
          </div>
          <div class="campo campo-botao">
            <button type="submit" id="btn-salvar-contato">Adicionar</button>
            <button type="button" id="btn-cancelar-contato" class="btn-secundario oculto" onclick="cancelarEdicaoContato()">Cancelar</button>
          </div>
        </div>
      </form>
    </section>

  </main>

  <!-- Notificação flutuante -->
  <div id="mensagem" class="mensagem oculto"></div>

  <script src="app.js"></script>
</body>
</html>
